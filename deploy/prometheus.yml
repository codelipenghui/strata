# Scrapes the Strata cluster's /metrics endpoints. Each process tags its metrics with
# role={node|meta}; Prometheus adds an `instance` label per target.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: strata
    metrics_path: /metrics
    static_configs:
      - targets:
          - meta:9300
          - node1:9300
          - node2:9300
          - node3:9300
