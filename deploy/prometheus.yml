# Scrapes the Strata cluster's /metrics endpoints. Each combined node tags its metrics with
# role=combined (it serves both the meta and node metric sets); Prometheus adds an `instance` label.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: strata
    metrics_path: /metrics
    static_configs:
      - targets:
          - node1:9300
          - node2:9300
          - node3:9300

  # ZooKeeper's built-in Prometheus metrics provider (enabled via ZOO_CFG_EXTRA in docker-compose.yml).
  # Feeds the "Strata — ZooKeeper" Grafana dashboard.
  - job_name: zookeeper
    metrics_path: /metrics
    static_configs:
      - targets:
          - zookeeper:7000
