name: CI

"on":
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  default:
    name: default verification
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run default unit and integration suite
        run: ./scripts/verify.sh
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-surefire-default
          path: |
            **/target/surefire-reports/**
            strata-it/target/correctness-artifacts/**
            strata-it/target/process-crash-logs/**
            strata-it/target/metadata-process-logs/**
          if-no-files-found: ignore
          retention-days: 14

  compatibility:
    name: compatibility and conformance
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run current compatibility and metadata-store conformance
        run: ./scripts/verify.sh --skip-default --compat
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-surefire-compatibility
          path: |
            **/target/surefire-reports/**
          if-no-files-found: ignore
          retention-days: 14

  fault:
    name: embedded fault verification
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run embedded stress/fault and process-crash suite
        run: ./scripts/verify.sh --skip-default --fault
      - name: Upload test reports and replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-surefire-fault
          path: |
            **/target/surefire-reports/**
            strata-it/target/correctness-artifacts/**
            strata-it/target/process-crash-logs/**
            strata-it/target/metadata-process-logs/**
          if-no-files-found: ignore
          retention-days: 14

  chaos:
    name: Docker chaos verification
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run Docker/Toxiproxy chaos suite
        run: ./scripts/verify.sh --skip-default --chaos
      - name: Upload test reports and replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-surefire-chaos
          path: |
            **/target/surefire-reports/**
            strata-it/target/correctness-artifacts/**
            strata-it/target/chaos-process-logs/**
            strata-it/target/external-nemesis-process-logs/**
            strata-it/target/external-control-nemesis-process-logs/**
            strata-it/target/process-crash-logs/**
            strata-it/target/metadata-process-logs/**
          if-no-files-found: ignore
          retention-days: 14

  soak:
    name: bounded soak verification
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
      - name: Run bounded stress/fault soak
        run: ./scripts/verify.sh --skip-default --soak
      - name: Upload test reports and replay artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-surefire-soak
          path: |
            **/target/surefire-reports/**
            strata-it/target/correctness-artifacts/**
          if-no-files-found: ignore
          retention-days: 14

  model-check:
    name: TLA+ model checking
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Run TLA+ model checker
        run: ./scripts/verify.sh --skip-default --tlc
