# A runnable single-host Strata cluster: ZooKeeper + one metadata service + a 3-node fleet (RF=3).
# Clients reach the metadata plane at localhost:9200.
#
#   ./scripts/build-image.sh     # packages the jar + builds strata-server:local
#   docker compose up            # starts the cluster using that image
#
# The image carries the pre-built fat jar (see Dockerfile), so build it first. Plain `up` reuses
# strata-server:local; `up --build` re-runs the Dockerfile and likewise needs the jar present.
#
# This is a development/soak topology, not a production deployment (single ZK, single metadata
# service, co-located on one host). It exists to exercise the real server processes end to end.

x-strata: &strata
  image: strata-server:local
  build: .
  restart: unless-stopped

services:
  zookeeper:
    image: zookeeper:3.9
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,srvr,mntr"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 3s
      retries: 10

  meta:
    <<: *strata
    command: ["meta"]
    environment:
      STRATA_ZK_CONNECT: "zookeeper:2181"
      STRATA_LISTEN_PORT: "9200"
    ports:
      - "9200:9200"   # metadata plane, for clients on the host
    depends_on:
      zookeeper:
        condition: service_healthy

  node1:
    <<: *strata
    command: ["node"]
    environment:
      STRATA_META_ENDPOINTS: "meta:9200"
      STRATA_LISTEN_PORT: "9100"
      STRATA_ADVERTISED_HOST: "node1"
      STRATA_HOST: "node1"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r0"
      STRATA_DATA_DIR: "/data"
    volumes:
      - node1-data:/data
    depends_on:
      - meta

  node2:
    <<: *strata
    command: ["node"]
    environment:
      STRATA_META_ENDPOINTS: "meta:9200"
      STRATA_LISTEN_PORT: "9100"
      STRATA_ADVERTISED_HOST: "node2"
      STRATA_HOST: "node2"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r1"
      STRATA_DATA_DIR: "/data"
    volumes:
      - node2-data:/data
    depends_on:
      - meta

  node3:
    <<: *strata
    command: ["node"]
    environment:
      STRATA_META_ENDPOINTS: "meta:9200"
      STRATA_LISTEN_PORT: "9100"
      STRATA_ADVERTISED_HOST: "node3"
      STRATA_HOST: "node3"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r2"
      STRATA_DATA_DIR: "/data"
    volumes:
      - node3-data:/data
    depends_on:
      - meta

  # --- observability: scrapes each process's /metrics (:9300) and renders the Strata dashboard ---
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - meta

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"   # open http://localhost:3000 -> "Strata — Cluster Overview"
    depends_on:
      - prometheus

volumes:
  node1-data:
  node2-data:
  node3-data:
