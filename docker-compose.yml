# A runnable single-host Strata cluster: ZooKeeper + a 3-node fleet where each node runs in
# `combined` mode — data (:9100) plus a co-resident metadata service (:9200). One node is elected
# metadata leader; the others are warm standbys, and clients reach the leader via the NOT_LEADER
# redirect. There is no separate strata-meta to deploy — the metadata plane scales with the nodes.
# Clients run inside the cluster network (e.g. the loadgen) and reach nodes by name, following the
# redirect to the leader, so no metadata port is published to the host.
#
#   ./scripts/build-image.sh     # packages the jar + builds strata-server:local
#   docker compose up            # starts the cluster using that image
#
# The image carries the pre-built fat jar (see Dockerfile), so build it first. Plain `up` reuses
# strata-server:local; `up --build` re-runs the Dockerfile and likewise needs the jar present.
#
# This is a development/soak topology, not a production deployment (single ZK, co-located on one
# host). It exercises the real server processes end to end.

x-strata: &strata
  image: strata-server:local
  build: .
  restart: unless-stopped

services:
  zookeeper:
    image: zookeeper:3.9
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,srvr,mntr"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Each node is `combined`: a StorageNode (:9100) + a MetadataService (:9200) in one process.
  # STRATA_META_ENDPOINTS lists all three nodes' meta ports, so each node and any in-cluster client
  # find the current leader (one hop, via the redirect). STRATA_ADVERTISED_HOST is the name peers
  # resolve and is also the leader's NOT_LEADER redirect hint.
  node1:
    <<: *strata
    command: ["combined"]
    environment:
      STRATA_ZK_CONNECT: "zookeeper:2181"
      STRATA_META_ENDPOINTS: "node1:9200,node2:9200,node3:9200"
      STRATA_META_LISTEN_PORT: "9200"
      STRATA_LISTEN_PORT: "9100"
      STRATA_ADVERTISED_HOST: "node1"
      STRATA_HOST: "node1"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r0"
      STRATA_DATA_DIR: "/data"
    volumes:
      - node1-data:/data
    depends_on:
      zookeeper:
        condition: service_healthy

  node2:
    <<: *strata
    command: ["combined"]
    environment:
      STRATA_ZK_CONNECT: "zookeeper:2181"
      STRATA_META_ENDPOINTS: "node1:9200,node2:9200,node3:9200"
      STRATA_META_LISTEN_PORT: "9200"
      STRATA_LISTEN_PORT: "9100"
      STRATA_ADVERTISED_HOST: "node2"
      STRATA_HOST: "node2"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r1"
      STRATA_DATA_DIR: "/data"
    volumes:
      - node2-data:/data
    depends_on:
      zookeeper:
        condition: service_healthy

  node3:
    <<: *strata
    command: ["combined"]
    environment:
      STRATA_ZK_CONNECT: "zookeeper:2181"
      STRATA_META_ENDPOINTS: "node1:9200,node2:9200,node3:9200"
      STRATA_META_LISTEN_PORT: "9200"
      STRATA_LISTEN_PORT: "9100"
      STRATA_ADVERTISED_HOST: "node3"
      STRATA_HOST: "node3"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r2"
      STRATA_DATA_DIR: "/data"
    volumes:
      - node3-data:/data
    depends_on:
      zookeeper:
        condition: service_healthy

  # --- observability: scrapes each combined node's /metrics (:9300) and renders the dashboard ---
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - node1

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"   # open http://localhost:3000 -> "Strata — Cluster Overview"
    depends_on:
      - prometheus

  # One-off load generator — does NOT start with `up` (profile-gated). Runs on the cluster network so
  # it resolves node names and follows leader redirects. Use scripts/perf.sh, or:
  #   docker compose run --rm --no-deps loadgen perf --meta node1:9200 --workload write --duration 120
  loadgen:
    <<: *strata
    profiles: ["tools"]
    restart: "no"
    command: ["perf", "--meta", "node1:9200", "--workload", "write", "--duration", "120"]

volumes:
  node1-data:
  node2-data:
  node3-data:
