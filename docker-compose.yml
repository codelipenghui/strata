# A runnable single-host Strata cluster: ZooKeeper + a 3-node fleet where each node runs in
# `combined` mode — one SCP listener (:9100) serving BOTH the data plane and a co-resident metadata
# service (routed by opcode). One node is elected controller leader; the others are warm standbys, and
# clients reach the leader via the NOT_LEADER redirect. There is no separate controller to deploy —
# the control plane scales with the nodes. Clients run inside the cluster network (e.g. the loadgen)
# and reach nodes by name, following the redirect to the leader, so no port is published to the host.
#
#   ./scripts/build-image.sh     # packages the jar + builds strata-server:local
#   docker compose up            # starts the cluster using that image
#
# The image carries the pre-built fat jar (see Dockerfile), so build it first. Plain `up` reuses
# strata-server:local; `up --build` re-runs the Dockerfile and likewise needs the jar present.
#
# This is a development/soak topology, not a production deployment (single ZK, co-located on one
# host). It exercises the real server processes end to end.

x-strata: &strata
  image: strata-server:local
  build: .
  restart: unless-stopped

services:
  zookeeper:
    image: zookeeper:3.9
    restart: unless-stopped          # ZK is the metadata plane's SPOF — must auto-recover
    environment:
      ZOO_4LW_COMMANDS_WHITELIST: "ruok,srvr,mntr"
      ZOO_AUTOPURGE_PURGEINTERVAL: "1"   # purge old snapshots/txnlogs hourly so ZK data can't grow unbounded
      ZOO_AUTOPURGE_SNAPRETAINCOUNT: "3"
      # Expose ZooKeeper's built-in Prometheus metrics provider on :7000 (path /metrics) so Prometheus
      # can scrape it for the "Strata — ZooKeeper" dashboard. ZOO_CFG_EXTRA is split on whitespace and
      # written one property per line into zoo.cfg, so keep each property space-separated and unbroken.
      # STRATA_ZK_FORCE_SYNC=no is an experimental single-host perf knob; it weakens ZK crash durability.
      ZOO_CFG_EXTRA: "metricsProvider.className=org.apache.zookeeper.metrics.prometheus.PrometheusMetricsProvider metricsProvider.httpPort=7000 metricsProvider.exportJvmInfo=true forceSync=${STRATA_ZK_FORCE_SYNC:-yes}"
    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc -w 2 localhost 2181 | grep -q imok"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Each node is `combined`: a DataNode + a Controller sharing one SCP listener (:9100) in one
  # process. STRATA_CONTROLLER_ENDPOINTS lists all three nodes at that port, so each node and any in-cluster
  # client find the current leader (one hop, via the redirect). STRATA_ADVERTISED_HOST is the name
  # peers resolve and is also the leader's NOT_LEADER redirect hint.
  node1:
    <<: *strata
    command: ["combined"]
    environment:
      STRATA_ZK_CONNECT: "zookeeper:2181"
      STRATA_CONTROLLER_ENDPOINTS: "node1:9100,node2:9100,node3:9100"
      # Default to the scalable namespace-log metadata backend with namespace sharding ON: each node owns
      # a shard of namespaces (rendezvous-hash) and forwards non-owned metadata ops to the owner. Override
      # any of these to "zk"/"false" to fall back to the single-leader in-ZooKeeper store.
      STRATA_CONTROLLER_BACKEND: "${STRATA_CONTROLLER_BACKEND:-namespace-log}"
      STRATA_CONTROLLER_SHARDING: "${STRATA_CONTROLLER_SHARDING:-true}"
      STRATA_CONTROLLER_LOG_RF: "${STRATA_CONTROLLER_LOG_RF:-3}"
      STRATA_CONTROLLER_LOG_ACK: "${STRATA_CONTROLLER_LOG_ACK:-2}"
      # Metadata-log durability is by replication (RF/ack), not single-node fsync — page-cache durable on the
      # ack quorum (crash-safe; disk-durable shortly via background writeback), matching the data plane.
      # Set true to fsync every metadata append (correlated-power-loss safe, much slower under data load).
      STRATA_CONTROLLER_LOG_FSYNC: "${STRATA_CONTROLLER_LOG_FSYNC:-false}"
      STRATA_LISTEN_PORT: "9100"
      STRATA_HEARTBEAT_INTERVAL_MS: "${STRATA_HEARTBEAT_INTERVAL_MS:-3000}"
      STRATA_REPAIR_SCAN_INTERVAL_MS: "${STRATA_REPAIR_SCAN_INTERVAL_MS:-5000}"
      STRATA_REPAIR_COMMAND_TIMEOUT_MS: "${STRATA_REPAIR_COMMAND_TIMEOUT_MS:-30000}"
      # generous liveness windows: under heavy data load a combined node's heartbeat can be delayed
      # behind the data flood on its shared SCP listener; don't let that be mistaken for a dead node
      STRATA_LEASE_MS: "60000"
      STRATA_DEAD_GRACE_MS: "300000"
      STRATA_ADVERTISED_HOST: "node1"
      STRATA_HOST: "node1"
      STRATA_NODE_ID: "1"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r0"
      STRATA_DATA_DIR: "/data"
      STRATA_SEAL_FSYNC: "${STRATA_SEAL_FSYNC:-false}"
      STRATA_BG_FLUSH_INTERVAL_MS: "${STRATA_BG_FLUSH_INTERVAL_MS:-500}"
      STRATA_BG_FLUSH_THRESHOLD_BYTES: "${STRATA_BG_FLUSH_THRESHOLD_BYTES:-4194304}"
      # Background-writeback knobs are tunable via STRATA_BG_FLUSH_INTERVAL_MS / _THRESHOLD_BYTES
      # (ChunkStore default: 500ms / 4 MiB). The default keeps dirty-page backlog bounded; making it
      # much laxer can hand control to kernel dirty throttling and worsen perf write stability.
      # STRATA_SEAL_FSYNC=true forces seal/open/delete metadata+data to local disk synchronously
      # (default false trades that local-crash durability for throughput). Even with it false,
      # recovery never loses acknowledged data: a sealed chunk's integrity ledger is retained until
      # the SEALED state is forced durable in the background.
      #
      # --- tuning knobs (defaults match current behaviour; uncomment to override) ---
      # Proactive missing/corrupt-replica detection cadence (controller, default 2 s).
      # Lower values accelerate repair convergence; higher reduces controller CPU under heavy load.
      # STRATA_VERIFY_INTERVAL_MS: "2000"
      # Maximum repair commands dispatched per node per heartbeat (controller, default 16).
      # Raise on a fast network; lower to reduce repair bandwidth competition with writes.
      # STRATA_CONTROLLER_MAX_COMMANDS_PER_HEARTBEAT: "16"
      # Node→controller RPC timeout for REGISTER / HEARTBEAT / FETCH_CHUNK (data-node, default 10 s).
      # Increase on high-latency networks; decrease to fail-fast in tight clusters.
      # STRATA_CONTROL_CALL_TIMEOUT_MS: "10000"
      # Repair pull granularity per FETCH_CHUNK request (data-node, default 4 MiB).
      # Larger values improve throughput on fast links; smaller reduces memory pressure under many concurrent repairs.
      # STRATA_REPAIR_FETCH_BYTES: "4194304"
      # Maximum SCP frame size for both encode and decode (transport, default 64 MiB).
      # Must be identical across all nodes and clients; raising allows larger single-RPC payloads.
      # STRATA_MAX_FRAME_BYTES: "67108864"
      # Netty worker threads for the SCP server (transport, default 0 = 2×cores).
      # STRATA_SCP_SERVER_IO_THREADS: "0"
      # Back-pressure window: maximum bytes of in-flight SCP requests accepted server-side (default 1 GiB).
      # Reduce on memory-constrained nodes; raise if client throughput saturates the window under heavy load.
      # STRATA_SCP_MAX_INFLIGHT_BYTES: "1073741824"
      # Client retry deadline across owner redirects and failover (client, default 15 s).
      # STRATA_CLIENT_CONTROLLER_RETRY_DEADLINE_MS: "15000"
      # Per-namespace metrics refresh period (server, default 10 s).
      # STRATA_METRICS_NS_REFRESH_INTERVAL_MS: "10000"
    volumes:
      - node1-data:/data
    depends_on:
      zookeeper:
        condition: service_healthy

  node2:
    <<: *strata
    command: ["combined"]
    environment:
      STRATA_ZK_CONNECT: "zookeeper:2181"
      STRATA_CONTROLLER_ENDPOINTS: "node1:9100,node2:9100,node3:9100"
      # Default to the scalable namespace-log metadata backend with namespace sharding ON: each node owns
      # a shard of namespaces (rendezvous-hash) and forwards non-owned metadata ops to the owner. Override
      # any of these to "zk"/"false" to fall back to the single-leader in-ZooKeeper store.
      STRATA_CONTROLLER_BACKEND: "${STRATA_CONTROLLER_BACKEND:-namespace-log}"
      STRATA_CONTROLLER_SHARDING: "${STRATA_CONTROLLER_SHARDING:-true}"
      STRATA_CONTROLLER_LOG_RF: "${STRATA_CONTROLLER_LOG_RF:-3}"
      STRATA_CONTROLLER_LOG_ACK: "${STRATA_CONTROLLER_LOG_ACK:-2}"
      # Metadata-log durability is by replication (RF/ack), not single-node fsync — page-cache durable on the
      # ack quorum (crash-safe; disk-durable shortly via background writeback), matching the data plane.
      # Set true to fsync every metadata append (correlated-power-loss safe, much slower under data load).
      STRATA_CONTROLLER_LOG_FSYNC: "${STRATA_CONTROLLER_LOG_FSYNC:-false}"
      STRATA_LISTEN_PORT: "9100"
      STRATA_HEARTBEAT_INTERVAL_MS: "${STRATA_HEARTBEAT_INTERVAL_MS:-3000}"
      STRATA_REPAIR_SCAN_INTERVAL_MS: "${STRATA_REPAIR_SCAN_INTERVAL_MS:-5000}"
      STRATA_REPAIR_COMMAND_TIMEOUT_MS: "${STRATA_REPAIR_COMMAND_TIMEOUT_MS:-30000}"
      STRATA_LEASE_MS: "60000"
      STRATA_DEAD_GRACE_MS: "300000"
      STRATA_ADVERTISED_HOST: "node2"
      STRATA_HOST: "node2"
      STRATA_NODE_ID: "2"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r1"
      STRATA_DATA_DIR: "/data"
      STRATA_SEAL_FSYNC: "${STRATA_SEAL_FSYNC:-false}"
      STRATA_BG_FLUSH_INTERVAL_MS: "${STRATA_BG_FLUSH_INTERVAL_MS:-500}"
      STRATA_BG_FLUSH_THRESHOLD_BYTES: "${STRATA_BG_FLUSH_THRESHOLD_BYTES:-4194304}"
    volumes:
      - node2-data:/data
    depends_on:
      zookeeper:
        condition: service_healthy

  node3:
    <<: *strata
    command: ["combined"]
    environment:
      STRATA_ZK_CONNECT: "zookeeper:2181"
      STRATA_CONTROLLER_ENDPOINTS: "node1:9100,node2:9100,node3:9100"
      # Default to the scalable namespace-log metadata backend with namespace sharding ON: each node owns
      # a shard of namespaces (rendezvous-hash) and forwards non-owned metadata ops to the owner. Override
      # any of these to "zk"/"false" to fall back to the single-leader in-ZooKeeper store.
      STRATA_CONTROLLER_BACKEND: "${STRATA_CONTROLLER_BACKEND:-namespace-log}"
      STRATA_CONTROLLER_SHARDING: "${STRATA_CONTROLLER_SHARDING:-true}"
      STRATA_CONTROLLER_LOG_RF: "${STRATA_CONTROLLER_LOG_RF:-3}"
      STRATA_CONTROLLER_LOG_ACK: "${STRATA_CONTROLLER_LOG_ACK:-2}"
      # Metadata-log durability is by replication (RF/ack), not single-node fsync — page-cache durable on the
      # ack quorum (crash-safe; disk-durable shortly via background writeback), matching the data plane.
      # Set true to fsync every metadata append (correlated-power-loss safe, much slower under data load).
      STRATA_CONTROLLER_LOG_FSYNC: "${STRATA_CONTROLLER_LOG_FSYNC:-false}"
      STRATA_LISTEN_PORT: "9100"
      STRATA_HEARTBEAT_INTERVAL_MS: "${STRATA_HEARTBEAT_INTERVAL_MS:-3000}"
      STRATA_REPAIR_SCAN_INTERVAL_MS: "${STRATA_REPAIR_SCAN_INTERVAL_MS:-5000}"
      STRATA_REPAIR_COMMAND_TIMEOUT_MS: "${STRATA_REPAIR_COMMAND_TIMEOUT_MS:-30000}"
      STRATA_LEASE_MS: "60000"
      STRATA_DEAD_GRACE_MS: "300000"
      STRATA_ADVERTISED_HOST: "node3"
      STRATA_HOST: "node3"
      STRATA_NODE_ID: "3"
      STRATA_ZONE: "z0"
      STRATA_RACK: "r2"
      STRATA_DATA_DIR: "/data"
      STRATA_SEAL_FSYNC: "${STRATA_SEAL_FSYNC:-false}"
      STRATA_BG_FLUSH_INTERVAL_MS: "${STRATA_BG_FLUSH_INTERVAL_MS:-500}"
      STRATA_BG_FLUSH_THRESHOLD_BYTES: "${STRATA_BG_FLUSH_THRESHOLD_BYTES:-4194304}"
    volumes:
      - node3-data:/data
    depends_on:
      zookeeper:
        condition: service_healthy

  # --- observability: scrapes each combined node's /metrics (:9300) and ZooKeeper's metrics (:7000),
  #     and renders the dashboards ---
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
    volumes:
      - ./deploy/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      - node1
      - zookeeper

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./deploy/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"   # open http://localhost:3000 -> Strata dashboards: Cluster / Node / JVM / ZooKeeper
    depends_on:
      - prometheus

  # One-off load generator — does NOT start with `up` (profile-gated). Runs on the cluster network so
  # it resolves node names and follows leader redirects. Use scripts/perf.sh, or:
  #   docker compose run --rm --no-deps loadgen perf --controller node1:9100 --duration 300
  loadgen:
    <<: *strata
    profiles: ["tools"]
    restart: "no"
    command: ["perf", "--controller", "node1:9100"]

volumes:
  node1-data:
  node2-data:
  node3-data:
